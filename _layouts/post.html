---
layout: base
---

<a class="back-link" href="{{ '/' | relative_url }}" onclick="window.history.back(); return false;">← Back to Homepage</a>

<div class="article-masthead">
  {%- if page.categories.size > 0 -%}
    <span class="article-category">{{ page.categories | first }}</span>
  {%- endif -%}
  <h1 class="article-title">{{ page.title | escape }}</h1>
  <div class="article-meta">{{ page.date | date: "%B %-d, %Y" }}</div>
</div>

{%- if page.cover -%}
  <div class="article-cover">
    <img
      src="{%- if page.cover_small -%}{{ page.cover_small | relative_url }}{%- else -%}{{ page.cover | relative_url }}{%- endif -%}"
      alt="{{ page.title | escape }}"
      loading="lazy"
      style="max-width: 100%; height: auto;">
  </div>
{%- endif -%}

<div class="article-body">
  {{ content }}
</div>

<!-- Navigation Back -->
<script>
document.querySelector('.back-link').addEventListener('click', function(e) {
  if (window.history.length > 1) {
    e.preventDefault();
    window.history.back();
  }
});
</script>
